services:
  target-server:
    build:
      context: ./target-server
      dockerfile: Dockerfile
    container_name: ctf-nmap-reconnaissance-mastery-target-server
    networks:
      ctf-nmap-reconnaissance-mastery-net:
        ipv4_address: 172.25.145.120
    restart: unless-stopped
  attacker:
    build:
      context: ./attacker
      dockerfile: Dockerfile
    container_name: ctf-nmap-reconnaissance-mastery-attacker
    networks:
      ctf-nmap-reconnaissance-mastery-net:
        ipv4_address: 172.25.145.3
    cap_add:
      - NET_RAW
      - NET_ADMIN
    stdin_open: true
    tty: true
    restart: unless-stopped
networks:
  ctf-nmap-reconnaissance-mastery-net:
    name: ctf-nmap-reconnaissance-mastery-net
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.25.145.0/24
          gateway: 172.25.145.1
